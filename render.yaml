services:
  # Python Flask Backend API
  - type: web
    name: easebrain-backend
    rootDir: backend-ease-brain
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python seed_roles.py
    startCommand: gunicorn -c gunicorn_config.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: FLASK_APP
        value: app.py
      - key: DATABASE_URL
        fromDatabase:
          name: easebrain-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://www.easebrain.live
      - key: VERIFY_BASE_URL
        value: https://www.easebrain.live/verify
      - key: WEB_CONCURRENCY
        value: "2"
    healthCheckPath: /api/health
  # React Frontend (Static Site)
  - type: web
    name: easebrain-frontend
    rootDir: frontend-ease-brain
    env: static
    buildCommand: npm install --production=false && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BASE_URL
        value: https://easebrain-backend.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /index.html
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
databases:
  - name: easebrain-db
    databaseName: easebrain
    user: easebrain_user
    region: oregon
    plan: free
