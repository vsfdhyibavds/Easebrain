services:
  - type: web
    name: easebrain-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend-ease-brain/requirements.txt && cd backend-ease-brain && flask db upgrade
    startCommand: cd backend-ease-brain && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: easebrain-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-easebrain.vercel.app
      - key: VERIFY_BASE_URL
        value: https://easebrain-backend.onrender.com

databases:
  - name: easebrain-db
    databaseName: easebrain
    user: easebrain_user
    region: oregon
    plan: free
