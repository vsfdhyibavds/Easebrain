<?xml version="1.0" encoding="UTF-8"?>
<!-- Project logo: simplified EaseBrain-style mark (meditating figure, leaves, butterfly).
     This is a lightweight SVG approximation of the provided artwork for use as favicon/brand mark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="EaseBrain logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#13b8a0" />
      <stop offset="100%" stop-color="#8ad34a" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="white" />
  <!-- circular wreath -->
  <path d="M340 200a140 140 0 1 1-280 0" fill="none" stroke="url(#g)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- leaves along wreath -->
  <g fill="#7ad08a" opacity="0.95">
    <ellipse cx="82" cy="120" rx="12" ry="6" transform="rotate(-30 82 120)" />
    <ellipse cx="110" cy="90" rx="12" ry="6" transform="rotate(-15 110 90)" />
    <ellipse cx="138" cy="72" rx="12" ry="6" transform="rotate(0 138 72)" />
    <ellipse cx="180" cy="64" rx="12" ry="6" transform="rotate(12 180 64)" />
    <ellipse cx="232" cy="72" rx="12" ry="6" transform="rotate(24 232 72)" />
    <ellipse cx="270" cy="96" rx="12" ry="6" transform="rotate(36 270 96)" />
  </g>

  <!-- meditating silhouette -->
  <g transform="translate(200,170)">
    <ellipse cx="0" cy="-10" rx="26" ry="28" fill="#118f84" />
    <path d="M-70 70c0-32 22-56 50-56s50 24 50 56" fill="#13b8a0" />
    <path d="M-20 50c-6-24-12-48 20-48s26 24 20 48" fill="#0f7f75" opacity="0.95" />
    <path d="M-52 24c10-6 28-10 52-7 26 3 38 11 52 18 0 0 6 4 8 10 0 0-58 12-120-21z" fill="#0f7f75" opacity="0.9" />
    <!-- arms in lotus -->
    <path d="M-88 90c18-24 40-28 72-28s56 4 72 28" fill="#0aa38f" opacity="0.95" />
  </g>

  <!-- butterfly -->
  <g transform="translate(300,100) scale(0.7)">
    <path d="M0 10c12-16 36-24 54-18 18 6 30 26 24 44-6 18-28 26-46 26-18 0-32-10-36-30-4-20 4-22 4-22z" fill="#ffb23a" />
    <path d="M0 10c-12-16-36-24-54-18-18 6-30 26-24 44 6 18 28 26 46 26 18 0 32-10 36-30 4-20-4-22-4-22z" fill="#9ced5a" transform="translate(16,0) scale(-1,1)"/>
    <circle cx="0" cy="16" r="2" fill="#7f3" />
  </g>

  <!-- wordmark (optional: small) -->
  <text x="200" y="370" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0f7f75" text-anchor="middle">EaseBrain</text>
</svg>
